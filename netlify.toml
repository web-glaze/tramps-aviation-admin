[build]
  command = "yarn run build"
  publish = "build"

[build.environment]
  CI = "false"
  SKIP_PREFLIGHT_CHECK = "true"
  GENERATE_SOURCEMAP = "false"
  # Netlify's secret scanner flags any env-var VALUE found in repo files or
  # build output. Firebase web config (apiKey, projectId, authDomain,
  # senderId, appId, storageBucket, vapidKey) is public by design — it is
  # meant to ship in the browser bundle; security comes from Firebase
  # Security Rules, not from hiding these IDs. Tell the scanner to ignore
  # exactly these keys so the build doesn't fail on a false positive.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_VAPID_KEY"
